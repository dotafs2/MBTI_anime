  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080812;
      color: #e8e6f0;
      font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; color: #c084fc; margin-bottom: 0.25rem; }
    .sub { color: #8a86a8; font-size: 0.82rem; margin-bottom: 2rem; }
    h2 { font-size: 1rem; color: #a78bfa; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid rgba(160,120,255,0.15); padding-bottom: 0.4rem; }

    /* ── Score bars ── */
    .prob-wrap { max-width: 640px; }
    .prob-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; }
    .prob-label { width: 120px; font-size: 0.78rem; text-align: right; flex-shrink: 0; }
    .prob-bg { flex: 1; height: 18px; background: #1a1a2e; border-radius: 4px; overflow: hidden; }
    .prob-fill { height: 100%; border-radius: 4px; }
    .prob-info { width: 90px; font-size: 0.73rem; color: #8a86a8; flex-shrink: 0; }

    /* ── Cards ── */
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
    .card {
      background: #10101e;
      border: 1px solid rgba(160,120,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .card-top { height: 3px; }
    .card-body { padding: 1rem; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
    .card-img { width: 64px; height: 64px; object-fit: contain; border-radius: 8px; background: #1a1a2e; float: right; margin: 0 0 0.5rem 0.75rem; }
    .char-name { font-size: 1rem; font-weight: 700; }
    .char-series { font-size: 0.72rem; color: #8a86a8; margin-top: 0.15rem; }
    .rarity-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; color: #000; flex-shrink: 0; }
    .tagline { font-size: 0.72rem; color: #a78bfa; margin-bottom: 0.6rem; font-style: italic; line-height: 1.4; clear: both; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem; margin-bottom: 0.6rem; }
    .stat { font-size: 0.68rem; }
    .stat-label { color: #8a86a8; margin-bottom: 2px; }
    .dots { display: flex; gap: 2px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a3e; }
    .dot.on { }
    .tags-row { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 0.6rem; }
    .tag { font-size: 0.62rem; padding: 1px 6px; border: 1px solid rgba(160,120,255,0.2); border-radius: 99px; color: #a78bfa; background: rgba(160,120,255,0.07); }
    .score-line { font-size: 0.75rem; color: #8a86a8; margin-bottom: 0.6rem; }
    .score-line strong { }
    .desc-preview { font-size: 0.72rem; color: #8a86a8; line-height: 1.5; margin-bottom: 0.75rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .preview-btn {
      width: 100%; padding: 0.55rem; border: none; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; color: #fff;
      transition: opacity 0.2s;
    }
    .preview-btn:hover { opacity: 0.82; }
  </style>
</head>

    ],
  ];

  const RARITY_COLORS = { legendary:'#efbf04', rare:'#c084fc', uncommon:'#38bdf8', common:'#6b7280' };
  const STAT_LABELS = { danger:'危险', love:'恋爱脑', chuuni:'中二', survival:'队友存活率', dark:'黑化概率', iq:'智力' };

  // ── Calc max possible score per character ──
  function calcMaxScores() {
    const chars = Object.keys(TYPES);
    const max = {};
    chars.forEach(k => max[k] = 0);
    QUESTION_SCORES.forEach(opts => {
      chars.forEach(k => {
        const best = Math.max(...opts.map(s => s[k] || 0));
        max[k] += best;
      });
    });
    return max;
  }

  // ── Render prob bars ──
  function renderBars(maxScores) {
    const total = Object.values(maxScores).reduce((a,b) => a+b, 0);
    const maxVal = Math.max(...Object.values(maxScores));
    const sorted = Object.entries(maxScores).sort((a,b) => b[1]-a[1]);
    const wrap = document.getElementById('prob-wrap');
    sorted.forEach(([key, score]) => {
      const t = TYPES[key];
      const pct = ((score / total) * 100).toFixed(1);
      const barW = Math.round((score / maxVal) * 100);
      const row = document.createElement('div');
      row.className = 'prob-row';
      row.innerHTML = `
        <div class="prob-label" style="color:${t.color}">${t.emoji} ${t.name}</div>
        <div class="prob-bg"><div class="prob-fill" style="width:${barW}%;background:${t.color}"></div></div>
        <div class="prob-info">max ${score}pt &nbsp;${pct}%</div>
      `;
      wrap.appendChild(row);
    });
  }

  // ── Render cards ──
  function renderCards(maxScores) {
    const grid = document.getElementById('char-grid');
    document.querySelector('h2:last-of-type').textContent =
      `所有角色 / All Characters (${Object.keys(TYPES).length})`;

    Object.entries(TYPES).forEach(([key, t]) => {
      const dotsHtml = (val, color) =>
        Array.from({length:5}, (_,i) =>
          `<div class="dot${i<val?' on':''}" style="${i<val?'background:'+color:''}"></div>`
        ).join('');

      const statsHtml = Object.keys(STAT_LABELS).map(s =>
        `<div class="stat">
          <div class="stat-label">${STAT_LABELS[s]}</div>
          <div class="dots">${dotsHtml(t.stats[s], t.color)}</div>
        </div>`
      ).join('');

      const tagsHtml = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
      const rc = RARITY_COLORS[t.rarityLabel] || '#6b7280';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top" style="background:${t.color}"></div>
        <div class="card-body">
          <img class="card-img" src="${t.image}" onerror="this.style.display='none'">
          <div class="card-head">
            <div>
              <div class="char-name" style="color:${t.color}">${t.emoji} ${t.name}</div>
              <div class="char-series">${t.series}</div>
            </div>
            <span class="rarity-badge" style="background:${rc}">${t.rarityLabel.toUpperCase()}</span>
          </div>
          <div class="tagline">${t.tagline}</div>
          <div class="stats-row">${statsHtml}</div>
          <div class="tags-row">${tagsHtml}</div>
          <div class="score-line">最高可得分: <strong style="color:${t.color}">${maxScores[key]} pts</strong> · 稀有度: ${t.rarity}</div>
          <div class="desc-preview">${t.desc}</div>
          <button class="preview-btn" style="background:${t.color}" onclick="previewResult('${key}')">
            预览结果页 →
          </button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function previewResult(key) {
    // Build a fake scores object where the target key is at max, others are 0
    var fakeScores = {};
    Object.keys(TYPES).forEach(function(k) { fakeScores[k] = 0; });
    fakeScores[key] = maxScores[key] || 99;
    localStorage.setItem('aniti_result', JSON.stringify({ key: key, scores: fakeScores }));
    window.open('index.html', '_blank');
  }

  // ── Init ──
  const maxScores = calcMaxScores();
  renderBars(maxScores);
  renderCards(maxScores);
  </script>
