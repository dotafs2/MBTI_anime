<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080812" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>次元人格测定 | ANITI</title>
  <style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080812;
  --card: #10101e;
  --card2: #15152a;
  --border: rgba(160, 120, 255, 0.18);
  --text: #e8e6f0;
  --muted: #8a86a8;
  --accent: #c084fc;
  --accent2: #f472b6;
  --radius: 16px;
  --radius-sm: 10px;
  --ease: 0.22s cubic-bezier(0.4,0,0.2,1);
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ===================== SCREENS ===================== */
.screen {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
  position: relative;
}
.screen.active { display: flex; }

/* ===================== LANDING ===================== */
#screen-landing {
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.landing-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.5;
  animation: drift 9s ease-in-out infinite;
}
.orb-1 { width: 480px; height: 480px; background: #7c3aed; top: -150px; left: -120px; animation-delay: 0s; }
.orb-2 { width: 380px; height: 380px; background: #db2777; bottom: -100px; right: -100px; animation-delay: -3s; }
.orb-3 { width: 280px; height: 280px; background: #0369a1; top: 45%; left: 55%; animation-delay: -5.5s; }

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(24px,-36px) scale(1.06); }
  66% { transform: translate(-18px,22px) scale(0.94); }
}

.landing-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 520px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--accent);
  background: rgba(192,132,252,0.12);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 100px;
  padding: 0.35em 1em;
  margin-bottom: 1.8rem;
  text-transform: uppercase;
}

.main-title {
  font-size: clamp(2.4rem, 9vw, 3.8rem);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 1.2rem;
  letter-spacing: -0.02em;
}
.title-highlight {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.main-desc {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.75;
  margin-bottom: 2.4rem;
}

.disclaimer {
  margin-top: 1.2rem;
  font-size: 0.7rem;
  color: #3a3860;
}

/* ===================== BUTTONS ===================== */
.btn-primary {
  display: inline-block;
  background: linear-gradient(135deg, #c084fc, #f472b6);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 700;
  padding: 0.85em 2.6em;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: var(--ease);
  box-shadow: 0 0 28px rgba(192,132,252,0.4);
  letter-spacing: 0.03em;
  font-family: inherit;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(192,132,252,0.6); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  display: inline-block;
  background: transparent;
  color: var(--muted);
  font-size: 0.95rem;
  font-weight: 600;
  padding: 0.8em 2em;
  border: 1px solid var(--border);
  border-radius: 100px;
  cursor: pointer;
  transition: var(--ease);
  font-family: inherit;
}
.btn-secondary:hover { color: var(--text); border-color: rgba(160,120,255,0.4); }

/* ===================== QUESTION SCREEN ===================== */
#screen-question {
  flex-direction: column;
  align-items: center;
  padding-bottom: 3rem;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 10px rgba(192,132,252,0.6);
}

.question-wrap {
  width: 100%;
  max-width: 600px;
  padding: 2.5rem 1.5rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
  flex: 1;
}

.question-meta { display: flex; align-items: baseline; gap: 0.4rem; font-size: 0.85rem; }
.question-meta #q-index { color: var(--accent); font-weight: 700; font-size: 1rem; }
.question-meta #q-total { color: var(--muted); }

.question-text {
  font-size: clamp(1.15rem, 3.5vw, 1.45rem);
  font-weight: 700;
  line-height: 1.65;
}

.options-grid { display: flex; flex-direction: column; gap: 0.75rem; }

.option-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.97rem;
  font-family: inherit;
  line-height: 1.55;
  padding: 1em 1.3em;
  text-align: left;
  cursor: pointer;
  transition: var(--ease);
  position: relative;
  overflow: hidden;
}
.option-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #c084fc, #f472b6);
  opacity: 0;
  transition: opacity var(--ease);
}
.option-btn > span { position: relative; z-index: 1; }
.option-btn:hover { border-color: rgba(192,132,252,0.5); transform: translateX(4px); }
.option-btn:hover::before { opacity: 0.08; }
.option-btn.selected { border-color: var(--accent); background: var(--card2); }
.option-btn.selected::before { opacity: 0.14; }

/* ===================== RESULT SCREEN ===================== */
#screen-result {
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}

.result-card {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-header { text-align: center; }

.result-code {
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  line-height: 1;
  margin-bottom: 0.3rem;
  /* color set inline by JS */
}
.result-name { font-size: 1.4rem; font-weight: 700; }
.result-tagline { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; }

.result-image-slot {
  width: 100%;
  aspect-ratio: 3/2;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--card2);
  border: 1px dashed rgba(160,120,255,0.25);
}
.result-image-slot img { width: 100%; height: 100%; object-fit: cover; }

.img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--muted);
  font-size: 0.8rem;
}
.img-placeholder span { font-size: 2.8rem; }

/* rarity bar */
.result-rarity-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  margin-bottom: 0.8rem;
  padding: 0.5em 1em;
  background: rgba(255,255,255,0.04);
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.08);
}
.rarity-badge {
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.2em 0.7em;
  border-radius: 4px;
  color: #fff;
}
.rarity-text {
  font-size: 0.82rem;
  color: var(--muted);
}
.rarity-text strong {
  color: var(--text);
  font-size: 1.1em;
}

/* soul quote */
.soul-quote {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.7;
  text-align: center;
  color: var(--text);
  padding: 1rem 1.2rem;
  position: relative;
  font-style: italic;
}
.soul-quote::before,
.soul-quote::after {
  font-size: 2rem;
  line-height: 1;
  opacity: 0.3;
  position: absolute;
}
.soul-quote::before { content: "\201C"; top: 0; left: 0.3rem; }
.soul-quote::after { content: "\201D"; bottom: 0; right: 0.3rem; }

/* stat rows */
.stats-block {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.55rem 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stat-row:last-child { border-bottom: none; }
.stat-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
  min-width: 72px;
}
.stat-dots { display: flex; gap: 4px; }
.stat-dot {
  width: 16px; height: 16px;
  border-radius: 3px;
  background: rgba(255,255,255,0.08);
  transition: background 0.25s, box-shadow 0.25s;
}
.chars-val {
  font-size: 0.88rem;
  color: var(--text);
  font-weight: 500;
}

.result-desc {
  font-size: 0.97rem;
  color: var(--muted);
  line-height: 1.78;
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 1rem 1.2rem;
  /* border-left color set by JS */
  border-left: 3px solid var(--accent);
}

.result-traits { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.trait-chip {
  font-size: 0.8rem;
  font-weight: 600;
  border-radius: 100px;
  padding: 0.3em 0.9em;
  /* colors set by JS */
}

.result-compat { display: flex; gap: 1rem; }
.compat-item {
  flex: 1;
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  border: 1px solid var(--border);
}
.compat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.compat-val { font-size: 1rem; font-weight: 800; letter-spacing: 0.08em; }

.result-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.result-actions .btn-primary,
.result-actions .btn-secondary { flex: 1; text-align: center; }

.result-disclaimer { text-align: center; font-size: 0.7rem; color: #3a3858; }

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1e1e36;
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.88rem;
  padding: 0.7em 1.6em;
  border-radius: 100px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== RESPONSIVE / MOBILE ===================== */

/* 选项按钮移动端不用 hover 位移动效果，避免 sticky hover */
@media (hover: none) {
  .option-btn:hover { transform: none; border-color: var(--border); }
  .option-btn:hover::before { opacity: 0; }
  .option-btn:active { border-color: rgba(192,132,252,0.5); background: var(--card2); }
  .option-btn:active::before { opacity: 0.1; }
}

/* iOS 安全区适配 */
.question-wrap, .landing-content {
  padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
}
#screen-result {
  padding-bottom: max(2rem, env(safe-area-inset-bottom));
}
.toast {
  bottom: max(2rem, calc(env(safe-area-inset-bottom) + 1rem));
}

@media (max-width: 480px) {
  .result-card { padding: 1.5rem 1.2rem; }
  .result-compat { flex-direction: column; }
  .result-actions { flex-direction: column; }
  .result-actions .btn-primary,
  .result-actions .btn-secondary { width: 100%; min-height: 52px; }
  .option-btn { min-height: 52px; padding: 0.9em 1.2em; }
  .btn-primary { min-height: 52px; }
}
  </style>
</head>
<body>

  <!-- ========== LANDING ========== -->
  <div id="screen-landing" class="screen active">
    <div class="landing-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="landing-content">
      <div class="badge">ANITI &middot; 次元人格测定系统 v1.0</div>

      <p class="main-desc">
        不是类型，不是标签。<br/>
        15 道题，找到那个住在你身体里的角色。
      </p>
      <button class="btn-primary" onclick="App.start()">开始测定</button>
      <p class="disclaimer">本测试仅供娱乐 &middot; 请勿对号入座 &middot; 如有雷同请检举你的朋友</p>

  <!-- ========== QUESTION ========== -->
  <div id="screen-question" class="screen">

      <div class="progress-fill" id="progress-fill"></div>

  <!-- ========== RESULT ========== -->
  <div id="screen-result" class="screen">

      <div class="result-header">

          <small>图片施工中</small>
        </div>
      </div>
      <!-- 灵魂拷问 -->
      <div class="soul-quote" id="soul-quote"></div>
      <!-- 描述 -->
      <div class="result-desc" id="result-desc"></div>
      <!-- 五维指数 -->
      <div class="stats-block" id="stats-block"></div>
      <!-- 特征标签 -->
      <div class="result-traits" id="result-traits"></div>
      <!-- 出自作品 -->
      <div class="result-compat">
        <div class="compat-item" style="flex:1">
          <span class="compat-label">出自作品</span>
          <span class="compat-val" id="result-series"></span>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" onclick="App.share()" id="share-btn">生成分享图片</button>
        <button class="btn-secondary" onclick="App.retry()">再测一次</button>
      </div>
      <p class="result-disclaimer">本测试仅供娱乐 &middot; 不作为任何诊断依据</p>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div id="toast" class="toast">已复制到剪贴板！</div>

  <script>
// ============================================================

/* ── 状态 ── */
var currentIndex = 0;
var scores = {};

/* ── 工具函数 ── */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function resetScores() {
  scores = {};
  Object.keys(TYPES).forEach(function(k) { scores[k] = 0; });
}

function calcResult() {
  return Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; })[0][0];
}

/* ── 渲染题目 ── */
function renderQuestion(index) {
  var q = QUESTIONS[index];
  var total = QUESTIONS.length;

  document.getElementById("progress-fill").style.width = (index / total * 100) + "%";
  document.getElementById("q-index").textContent = "第 " + (index + 1) + " 题";
  document.getElementById("q-total").textContent = "/ 共 " + total + " 题";
  document.getElementById("question-text").textContent = q.text;

  var grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  delete grid.dataset.locked;

  q.options.forEach(function(opt) {
    var btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = "<span>" + opt.text + "</span>";
    btn.addEventListener("click", function() { selectOption(btn, opt.scores); });
    grid.appendChild(btn);
  });
}

/* ── 选择选项 ── */
function selectOption(btn, optScores) {
  var grid = document.getElementById("options-grid");
  if (grid.dataset.locked) return;
  grid.dataset.locked = "1";

  btn.classList.add("selected");

  Object.entries(optScores).forEach(function(entry) {
    scores[entry[0]] = (scores[entry[0]] || 0) + entry[1];
  });

  setTimeout(function() {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion(currentIndex);
    } else {
      showResult();
    }
  }, 320);
}

/* ── 显示结果 ── */
function showResult() {
  document.getElementById("progress-fill").style.width = "100%";

  var key = calcResult();
  var t = TYPES[key];
  if (!t) { localStorage.removeItem("aniti_result"); showScreen("screen-landing"); return; }

  var rarityColors = { legendary: "#efbf04", rare: "#c084fc", uncommon: "#38bdf8", common: "#6b7280" };
  var rarityNames  = { legendary: "LEGENDARY", rare: "RARE", uncommon: "UNCOMMON", common: "COMMON" };
  var badge = document.getElementById("rarity-badge");
  badge.textContent = rarityNames[t.rarityLabel] || "COMMON";
  badge.style.background = rarityColors[t.rarityLabel] || "#6b7280";
  document.getElementById("rarity-pct").textContent = t.rarity;

  document.getElementById("result-code").textContent = t.name;
  document.getElementById("result-code").style.color = t.color;
  document.getElementById("result-name").textContent = t.series;
  document.getElementById("result-tagline").textContent = t.tagline;

  document.getElementById("soul-quote").textContent = t.soulQuote;

  document.getElementById("result-desc").textContent = t.desc;
  document.getElementById("result-desc").style.borderLeftColor = t.color;

  var STATS_META = [
    { key: "danger",   label: "危险指数", color: "#ef4444" },
    { key: "love",     label: "恋爱脑指数", color: "#f472b6" },
    { key: "chuuni",   label: "中二指数",  color: "#c084fc" },
    { key: "survival", label: "队友存活率", color: "#34d399" },
    { key: "dark",     label: "黑化概率",  color: "#94a3b8" },
    { key: "iq",       label: "智力指数",  color: "#60a5fa" },
  ];
  var statsBlock = document.getElementById("stats-block");
  statsBlock.innerHTML = "";
  STATS_META.forEach(function(meta) {
    var val = t.stats[meta.key] || 0;
    var row = document.createElement("div");
    row.className = "stat-row";
    var lbl = document.createElement("span");
    lbl.className = "stat-label";
    lbl.textContent = meta.label;
    var dotsWrap = document.createElement("span");
    dotsWrap.className = "stat-dots";
    for (var i = 0; i < 5; i++) {
      var dot = document.createElement("span");
      dot.className = "stat-dot";
      if (i < val) {
        dot.style.background = meta.color;
        dot.style.boxShadow = "0 0 6px " + meta.color + "88";
      }
      dotsWrap.appendChild(dot);
    }
    row.appendChild(lbl);
    row.appendChild(dotsWrap);
    statsBlock.appendChild(row);
  });

  document.getElementById("result-series").textContent = t.series;
  document.getElementById("result-emoji").textContent = t.emoji;

  var card = document.getElementById("result-card");
  card.style.borderColor = t.color + "40";

  var traitsEl = document.getElementById("result-traits");
  traitsEl.innerHTML = "";
  t.tags.forEach(function(tr) {
    var chip = document.createElement("span");
    chip.className = "trait-chip";
    chip.textContent = tr;
    chip.style.color = t.color;
    chip.style.background = t.color + "1a";
    chip.style.border = "1px solid " + t.color + "40";
    traitsEl.appendChild(chip);
  });

  var slot = document.getElementById("result-image-slot");
  slot.innerHTML = "";
  var img = new Image();
  img.onload = function() {
    slot.innerHTML = "";
    slot.appendChild(img);
  };
  img.onerror = function() {
    slot.innerHTML = '<div class="img-placeholder" style="background:linear-gradient(135deg,' + t.color + '22,' + t.color + '08)"><span style="font-size:4rem">' + t.emoji + '</span><span style="color:' + t.color + ';font-size:1.1rem;font-weight:700">' + t.name + '</span></div>';
  };
  img.src = t.image;

  localStorage.setItem("aniti_result", key);
  showScreen("screen-result");
}

/* ── 对外接口 ── */
var App = {
  start: function() {
    currentIndex = 0;
    resetScores();
    renderQuestion(0);
    showScreen("screen-question");
  },
  retry: function() {
    localStorage.removeItem("aniti_result");
    App.start();
  },
  share: function() {
    var btn = document.getElementById("share-btn");
    btn.textContent = "生成中…";
    btn.disabled = true;

    var key = calcResult();
    var t = TYPES[key];

    var W = 750, H = 1080;
    var canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext("2d");

    function drawCard(charImg, qrImg) {
      // 背景
      var bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, "#080812");
      bg.addColorStop(1, "#10101e");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // 顶部色条
      ctx.fillStyle = t.color;
      ctx.fillRect(0, 0, W, 6);

      // 左侧竖线装饰
      ctx.fillStyle = t.color + "60";
      ctx.fillRect(40, 40, 4, H - 80);

      // 角色图片（居中上方）
      var imgW = 340, imgH = 340;
      var imgX = (W - imgW) / 2, imgY = 60;
      if (charImg) {
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(imgX, imgY, imgW, imgH, 20);
        ctx.clip();
        ctx.drawImage(charImg, imgX, imgY, imgW, imgH);
        ctx.restore();
      } else {
        ctx.fillStyle = t.color + "22";
        ctx.beginPath();
        ctx.roundRect(imgX, imgY, imgW, imgH, 20);
        ctx.fill();
        ctx.fillStyle = t.color;
        ctx.font = "bold 80px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(t.emoji, W / 2, imgY + imgH / 2 + 28);
      }

      // 角色名
      ctx.fillStyle = t.color;
      ctx.font = "bold 72px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(t.name, W / 2, imgY + imgH + 70);

      // 作品名
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "28px sans-serif";
      ctx.fillText(t.series, W / 2, imgY + imgH + 110);

      // tagline
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "italic 26px sans-serif";
      ctx.fillText(t.tagline, W / 2, imgY + imgH + 155);

      // 分割线
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(60, imgY + imgH + 180);
      ctx.lineTo(W - 60, imgY + imgH + 180);
      ctx.stroke();

      // 五维指数
      var STATS_META = [
        { key: "danger",   label: "危险指数",   color: "#ef4444" },
        { key: "love",     label: "恋爱脑指数", color: "#f472b6" },
        { key: "chuuni",   label: "中二指数",   color: "#c084fc" },
        { key: "survival", label: "队友存活率", color: "#34d399" },
        { key: "dark",     label: "黑化概率",   color: "#94a3b8" },
        { key: "iq",       label: "智力指数",   color: "#60a5fa" },
      ];
      var statY = imgY + imgH + 210;
      var statRowH = 52;
      ctx.font = "bold 24px sans-serif";
      STATS_META.forEach(function(m, i) {
        var y = statY + i * statRowH;
        var val = (t.stats && t.stats[m.key]) || 0;
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.textAlign = "left";
        ctx.fillText(m.label, 70, y + 20);
        for (var d = 0; d < 5; d++) {
          ctx.fillStyle = d < val ? m.color : "rgba(255,255,255,0.1)";
          ctx.beginPath();
          ctx.roundRect(300 + d * 44, y, 36, 30, 5);
          ctx.fill();
        }
      });

      // 稀有度 badge
      var rarityColors = { legendary: "#efbf04", rare: "#c084fc", uncommon: "#38bdf8", common: "#6b7280" };
      var rarityNames  = { legendary: "LEGENDARY", rare: "RARE", uncommon: "UNCOMMON", common: "COMMON" };
      var badgeY = statY + STATS_META.length * statRowH + 30;
      ctx.fillStyle = rarityColors[t.rarityLabel] || "#6b7280";
      ctx.beginPath();
      ctx.roundRect(70, badgeY, 160, 36, 18);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 20px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(rarityNames[t.rarityLabel] || "COMMON", 150, badgeY + 24);

      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "22px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("仅 " + t.rarity + " 的人测到此角色", 248, badgeY + 24);

      // QR code 右下角
      var qrSize = 120, qrPad = 40;
      var qrX = W - qrSize - qrPad, qrY = H - qrSize - qrPad - 24;
      if (qrImg) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.roundRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 36, 10);
        ctx.fill();
        ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.font = "18px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("mbtianime.com", qrX + qrSize / 2, qrY + qrSize + 22);
      }

      // 底部水印
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.font = "20px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("ANITI · 次元人格测定  mbtianime.com", W / 2, H - 24);

      // 导出
      canvas.toBlob(function(blob) {
        btn.textContent = "生成分享图片";
        btn.disabled = false;
        var file = new File([blob], "aniti-" + t.code + ".png", { type: "image/png" });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: "ANITI 次元人格测定", text: "我是 " + t.name + "！" }).catch(function(){});
        } else {
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "aniti-" + t.code + ".png";
          a.click();
        }
      }, "image/png");
    }

    // 并行加载角色图 + QR，任一失败都能降级
    var charImg = null, qrImg = null, loaded = 0;
    function onLoaded() {
      loaded++;
      if (loaded === 2) drawCard(charImg, qrImg);
    }
    var ci = new Image();
    ci.crossOrigin = "anonymous";
    ci.onload = function() { charImg = ci; onLoaded(); };
    ci.onerror = onLoaded;
    ci.src = t.image;

    var qi = new Image();
    qi.crossOrigin = "anonymous";
    qi.onload = function() { qrImg = qi; onLoaded(); };
    qi.onerror = onLoaded;
    qi.src = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https%3A%2F%2Fmbtianime.com&bgcolor=000000&color=ffffff&format=png";
  },
};

function showToast() {
  var toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2200);
}

/* ── 页面加载时恢复上次结果 ── */
(function() {
  var saved = localStorage.getItem("aniti_result");
  if (saved && TYPES[saved]) {
    scores = {};
    Object.keys(TYPES).forEach(function(k) { scores[k] = 0; });
    scores[saved] = 99;
    try { showResult(); } catch(e) { localStorage.removeItem("aniti_result"); }
  } else if (saved) {
    // 旧版存的类型已不存在，清掉
    localStorage.removeItem("aniti_result");
  }
})();
