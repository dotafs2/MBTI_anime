<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080812" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>次元人格测定 | ANITI</title>
  <style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080812;
  --card: #10101e;
  --card2: #15152a;
  --border: rgba(160, 120, 255, 0.18);
  --text: #e8e6f0;
  --muted: #8a86a8;
  --accent: #c084fc;
  --accent2: #f472b6;
  --radius: 16px;
  --radius-sm: 10px;
  --ease: 0.22s cubic-bezier(0.4,0,0.2,1);
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ===================== SCREENS ===================== */
.screen {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
  position: relative;
}
.screen.active { display: flex; }

/* ===================== LANDING ===================== */
#screen-landing {
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.landing-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.5;
  animation: drift 9s ease-in-out infinite;
}
.orb-1 { width: 480px; height: 480px; background: #7c3aed; top: -150px; left: -120px; animation-delay: 0s; }
.orb-2 { width: 380px; height: 380px; background: #db2777; bottom: -100px; right: -100px; animation-delay: -3s; }
.orb-3 { width: 280px; height: 280px; background: #0369a1; top: 45%; left: 55%; animation-delay: -5.5s; }

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(24px,-36px) scale(1.06); }
  66% { transform: translate(-18px,22px) scale(0.94); }
}

.landing-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 520px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--accent);
  background: rgba(192,132,252,0.12);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 100px;
  padding: 0.35em 1em;
  margin-bottom: 1.8rem;
  text-transform: uppercase;
}

.main-title {
  font-size: clamp(2.4rem, 9vw, 3.8rem);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 1.2rem;
  letter-spacing: -0.02em;
}
.title-highlight {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.main-desc {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.75;
  margin-bottom: 2.4rem;
}

.disclaimer {
  margin-top: 1.2rem;
  font-size: 0.7rem;
  color: #3a3860;
}

/* ===================== BUTTONS ===================== */
.btn-primary {
  display: inline-block;
  background: linear-gradient(135deg, #c084fc, #f472b6);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 700;
  padding: 0.85em 2.6em;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: var(--ease);
  box-shadow: 0 0 28px rgba(192,132,252,0.4);
  letter-spacing: 0.03em;
  font-family: inherit;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(192,132,252,0.6); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  display: inline-block;
  background: transparent;
  color: var(--muted);
  font-size: 0.95rem;
  font-weight: 600;
  padding: 0.8em 2em;
  border: 1px solid var(--border);
  border-radius: 100px;
  cursor: pointer;
  transition: var(--ease);
  font-family: inherit;
}
.btn-secondary:hover { color: var(--text); border-color: rgba(160,120,255,0.4); }

/* ===================== QUESTION SCREEN ===================== */
#screen-question {
  flex-direction: column;
  align-items: center;
  padding-bottom: 3rem;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 10px rgba(192,132,252,0.6);
}

.question-wrap {
  width: 100%;
  max-width: 600px;
  padding: 2.5rem 1.5rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
  flex: 1;
}

.question-meta { display: flex; align-items: baseline; gap: 0.4rem; font-size: 0.85rem; }
.question-meta #q-index { color: var(--accent); font-weight: 700; font-size: 1rem; }
.question-meta #q-total { color: var(--muted); }

.question-text {
  font-size: clamp(1.15rem, 3.5vw, 1.45rem);
  font-weight: 700;
  line-height: 1.65;
}

.options-grid { display: flex; flex-direction: column; gap: 0.75rem; }

.option-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.97rem;
  font-family: inherit;
  line-height: 1.55;
  padding: 1em 1.3em;
  text-align: left;
  cursor: pointer;
  transition: var(--ease);
  position: relative;
  overflow: hidden;
}
.option-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #c084fc, #f472b6);
  opacity: 0;
  transition: opacity var(--ease);
}
.option-btn > span { position: relative; z-index: 1; }
.option-btn:hover { border-color: rgba(192,132,252,0.5); transform: translateX(4px); }
.option-btn:hover::before { opacity: 0.08; }
.option-btn.selected { border-color: var(--accent); background: var(--card2); }
.option-btn.selected::before { opacity: 0.14; }

/* ===================== RESULT SCREEN ===================== */
#screen-result {
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}

.result-card {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-header { text-align: center; }

.result-code {
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  line-height: 1;
  margin-bottom: 0.3rem;
  /* color set inline by JS */
}
.result-name { font-size: 1.4rem; font-weight: 700; }
.result-tagline { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; }

.result-image-slot {
  width: 100%;
  aspect-ratio: 3/2;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--card2);
  border: 1px dashed rgba(160,120,255,0.25);
}
.result-image-slot img { width: 100%; height: 100%; object-fit: cover; }

.img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--muted);
  font-size: 0.8rem;
}
.img-placeholder span { font-size: 2.8rem; }

/* rarity bar */
.result-rarity-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  margin-bottom: 0.8rem;
  padding: 0.5em 1em;
  background: rgba(255,255,255,0.04);
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.08);
}
.rarity-badge {
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.2em 0.7em;
  border-radius: 4px;
  color: #fff;
}
.rarity-text {
  font-size: 0.82rem;
  color: var(--muted);
}
.rarity-text strong {
  color: var(--text);
  font-size: 1.1em;
}

/* soul quote */
.soul-quote {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.7;
  text-align: center;
  color: var(--text);
  padding: 1rem 1.2rem;
  position: relative;
  font-style: italic;
}
.soul-quote::before,
.soul-quote::after {
  font-size: 2rem;
  line-height: 1;
  opacity: 0.3;
  position: absolute;
}
.soul-quote::before { content: "\201C"; top: 0; left: 0.3rem; }
.soul-quote::after { content: "\201D"; bottom: 0; right: 0.3rem; }

/* stat rows */
.stats-block {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.55rem 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stat-row:last-child { border-bottom: none; }
.stat-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
  min-width: 72px;
}
.stat-dots { display: flex; gap: 4px; }
.stat-dot {
  width: 16px; height: 16px;
  border-radius: 3px;
  background: rgba(255,255,255,0.08);
  transition: background 0.25s, box-shadow 0.25s;
}
.chars-val {
  font-size: 0.88rem;
  color: var(--text);
  font-weight: 500;
}

.result-desc {
  font-size: 0.97rem;
  color: var(--muted);
  line-height: 1.78;
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 1rem 1.2rem;
  /* border-left color set by JS */
  border-left: 3px solid var(--accent);
}

.result-traits { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.trait-chip {
  font-size: 0.8rem;
  font-weight: 600;
  border-radius: 100px;
  padding: 0.3em 0.9em;
  /* colors set by JS */
}

.result-compat { display: flex; gap: 1rem; }
.compat-item {
  flex: 1;
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  border: 1px solid var(--border);
}
.compat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.compat-val { font-size: 1rem; font-weight: 800; letter-spacing: 0.08em; }

.result-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.result-actions .btn-primary,
.result-actions .btn-secondary { flex: 1; text-align: center; }

.result-disclaimer { text-align: center; font-size: 0.7rem; color: #3a3858; }

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1e1e36;
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.88rem;
  padding: 0.7em 1.6em;
  border-radius: 100px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== RESPONSIVE / MOBILE ===================== */

/* 选项按钮移动端不用 hover 位移动效果，避免 sticky hover */
@media (hover: none) {
  .option-btn:hover { transform: none; border-color: var(--border); }
  .option-btn:hover::before { opacity: 0; }
  .option-btn:active { border-color: rgba(192,132,252,0.5); background: var(--card2); }
  .option-btn:active::before { opacity: 0.1; }
}

/* iOS 安全区适配 */
.question-wrap, .landing-content {
  padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
}
#screen-result {
  padding-bottom: max(2rem, env(safe-area-inset-bottom));
}
.toast {
  bottom: max(2rem, calc(env(safe-area-inset-bottom) + 1rem));
}

@media (max-width: 480px) {
  .result-card { padding: 1.5rem 1.2rem; }
  .result-compat { flex-direction: column; }
  .result-actions { flex-direction: column; }
  .result-actions .btn-primary,
  .result-actions .btn-secondary { width: 100%; min-height: 52px; }
  .option-btn { min-height: 52px; padding: 0.9em 1.2em; }
  .btn-primary { min-height: 52px; }
}
  </style>
</head>
<body>

  <!-- ========== LANDING ========== -->
  <div id="screen-landing" class="screen active">
    <div class="landing-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="landing-content">
      <div class="badge">ANITI &middot; 次元人格测定系统 v1.0</div>
      <h1 class="main-title">你是哪个<br/><span class="title-highlight">动漫角色</span>？</h1>
      <p class="main-desc">
        15 道题，测出你骨子里最像哪个角色。<br/>

      </p>
      <button class="btn-primary" onclick="App.start()">开始测定</button>
      <p class="disclaimer">本测试仅供娱乐 &middot; 请勿对号入座 &middot; 如有雷同请检举你的朋友</p>

  <!-- ========== QUESTION ========== -->
  <div id="screen-question" class="screen">

        <span id="q-index">第 1 题</span>

      <div class="options-grid" id="options-grid"></div>

  </div>

  <!-- ========== RESULT ========== -->
  <div id="screen-result" class="screen">
    <div class="result-card" id="result-card">
      <div class="result-header">
        <div class="result-rarity-bar" id="result-rarity-bar">
          <span class="rarity-badge" id="rarity-badge"></span>

        <div class="result-name" id="result-name"></div>

          <span id="result-emoji"></span>
          <small>图片施工中</small>

      </div>
      <!-- 灵魂拷问 -->
      <div class="soul-quote" id="soul-quote"></div>
      <!-- 描述 -->
      <div class="result-desc" id="result-desc"></div>
      <!-- 五维指数 -->
      <div class="stats-block" id="stats-block"></div>
      <!-- 特征标签 -->
      <div class="result-traits" id="result-traits"></div>

      <div class="result-compat">
        <div class="compat-item" style="flex:1">
          <span class="compat-label">出自作品</span>

        <button class="btn-primary" onclick="App.share()" id="share-btn">生成分享图片</button>

  <!-- ========== TOAST ========== -->

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
// ============================================================
//  ANITI · 次元人格测定系统
//
//  TODO 填充清单：
//    1. TYPES 中每个类型的 desc（人格描述段落）
//    2. TYPES 中每个类型的 traits（特征标签数组）
//    3. images/ 目录下放入对应人格图片，更新 image 路径
//    4. 可继续增加 QUESTIONS 题目或调整 scores 权重
// ============================================================

/* ── 角色类型定义 ── */
const TYPES = {
  SABER: {
    code: "SABER",
    name: "Saber",
    series: "Fate/stay night",
    tagline: "「我将此剑握至生命终结——这便是我与世界立下的契约。」",
    color: "#3b82f6",
    emoji: "⚔️",
    image: "images/saber.png",
    rarity: "8.4%", rarityLabel: "rare",
    stats: { danger: 4, love: 2, chuuni: 4, survival: 4, dark: 5 },
    soulQuote: "你把自己打造成了一把剑——冷硬、无私、永不弯折。但剑没有愿望，而你有。那才是你真正的悲剧所在。",
    desc: "你是从石中拔出王者之剑的那个人。为了被接受为王，你隐藏了自己的身份，压抑了所有情感——因为你认为王不该有弱点。你的骑士们最终背叛了你，你在卡姆兰战场孤独死去，身边无一人。即便如此，你求的圣杯愿望不是复仇，不是重生，而是「重新选择一个更合适的王」——因为你从未认为自己配得上那把剑。你来到这个时代，带着一个不会被任何人理解的自我否定，和一把从未熄灭的圣剑。",
    tags: ["孤独的王", "自我否定", "契约与誓言", "压抑情感", "Alter线已解锁"],
  },
  DIO: {
    code: "DIO",
    name: "DIO",
    series: "JoJo's Bizarre Adventure",
    tagline: "「このDIOだ！」",
    color: "#f59e0b",
    emoji: "👑",
    image: "images/dio.png",
    rarity: "2.8%", rarityLabel: "legendary",
    stats: { danger: 5, love: 0, chuuni: 5, survival: 1, dark: 5 },
    soulQuote: "别人在思考要不要行动的时候，你已经在时间停止的世界里走完了全程。",
    desc: "你是绝对的。没有妥协，没有软弱，没有所谓的道德枷锁。你的字典里只有「胜利」和「还没轮到你」。你不需要别人的认可，因为认可本来就是弱者向强者表达的敬畏。这个世界，终将是你的。",
    tags: ["灭世", "支配", "绝对", "无情", "王者"],
  },
  FEIYANYANG: {
    code: "FEIYANYANG",
    name: "沸羊羊",
    series: "喜羊羊与灰太狼",
    tagline: "「为了美羊羊，我可以做任何事！」",
    color: "#f97316",
    emoji: "🐏",
    image: "images/feiyanyang.png",
    rarity: "23.1%", rarityLabel: "uncommon",
    stats: { danger: 2, love: 5, chuuni: 2, survival: 3, dark: 3 },
    soulQuote: "你的一切行动都有一个终极动机——那个人。旁人叫它冲动，你叫它爱。",
    desc: "你是彻头彻尾的恋爱脑。力气有，冲劲有，脑子……恋爱的时候暂时不在线。你可以为了在意的人做任何事，包括以一敌百、放弃尊严、和强大的敌人正面硬刚。别人觉得你傻，但你清楚地知道：为了那个人，傻一点又怎样。",
    tags: ["恋爱脑", "热血", "冲动", "为爱痴狂", "傻乎乎但真诚"],
  },
};

/* ── 题目列表 ── */
const QUESTIONS = [
  {
    text: "如果你获得了毁灭世界的力量，你会？",
    options: [
      { text: "先毁灭，再以神的身份重建一个新秩序", scores: { DIO: 4 } },
      { text: "用它来守护每一个无辜之人", scores: { SABER: 4 } },
      { text: "不管什么力量，只要能保护那个人就够了", scores: { FEIYANYANG: 4 } },
      { text: "研究一下原理——没有任何人值得拥有这种力量", scores: { SABER: 2, DIO: 1 } },
    ],

/* ── 状态 ── */
var currentIndex = 0;
var scores = {};

/* ── 工具函数 ── */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function resetScores() {
  scores = {};
  Object.keys(TYPES).forEach(function(k) { scores[k] = 0; });
}

function calcResult() {
  return Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; })[0][0];
}

/* ── 渲染题目 ── */
function renderQuestion(index) {
  var q = QUESTIONS[index];
  var total = QUESTIONS.length;

  document.getElementById("progress-fill").style.width = (index / total * 100) + "%";
  document.getElementById("q-index").textContent = "第 " + (index + 1) + " 题";
  document.getElementById("q-total").textContent = "/ 共 " + total + " 题";
  document.getElementById("question-text").textContent = q.text;

  var grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  delete grid.dataset.locked;

  q.options.forEach(function(opt) {
    var btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = "<span>" + opt.text + "</span>";
    btn.addEventListener("click", function() { selectOption(btn, opt.scores); });
    grid.appendChild(btn);
  });
}

/* ── 选择选项 ── */
function selectOption(btn, optScores) {
  var grid = document.getElementById("options-grid");
  if (grid.dataset.locked) return;
  grid.dataset.locked = "1";

  btn.classList.add("selected");

  Object.entries(optScores).forEach(function(entry) {
    scores[entry[0]] = (scores[entry[0]] || 0) + entry[1];
  });

  setTimeout(function() {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion(currentIndex);
    } else {
      showResult();
    }
  }, 320);
}

/* ── 显示结果 ── */
function showResult() {
  document.getElementById("progress-fill").style.width = "100%";

  var key = calcResult();
  var t = TYPES[key];

  var rarityColors = { legendary: "#efbf04", rare: "#c084fc", uncommon: "#38bdf8", common: "#6b7280" };
  var rarityNames  = { legendary: "LEGENDARY", rare: "RARE", uncommon: "UNCOMMON", common: "COMMON" };
  var badge = document.getElementById("rarity-badge");
  badge.textContent = rarityNames[t.rarityLabel] || "COMMON";
  badge.style.background = rarityColors[t.rarityLabel] || "#6b7280";
  document.getElementById("rarity-pct").textContent = t.rarity;

  document.getElementById("result-code").textContent = t.name;
  document.getElementById("result-code").style.color = t.color;
  document.getElementById("result-name").textContent = t.series;
  document.getElementById("result-tagline").textContent = t.tagline;

  document.getElementById("soul-quote").textContent = t.soulQuote;

  document.getElementById("result-desc").textContent = t.desc;
  document.getElementById("result-desc").style.borderLeftColor = t.color;

  var STATS_META = [
    { key: "danger",   label: "危险指数", color: "#ef4444" },
    { key: "love",     label: "恋爱脑指数", color: "#f472b6" },
    { key: "chuuni",   label: "中二指数",  color: "#c084fc" },
    { key: "survival", label: "队友存活率", color: "#34d399" },
    { key: "dark",     label: "黑化概率",  color: "#94a3b8" },
  ];
  var statsBlock = document.getElementById("stats-block");
  statsBlock.innerHTML = "";
  STATS_META.forEach(function(meta) {
    var val = t.stats[meta.key] || 0;
    var row = document.createElement("div");
    row.className = "stat-row";
    var lbl = document.createElement("span");
    lbl.className = "stat-label";
    lbl.textContent = meta.label;
    var dotsWrap = document.createElement("span");
    dotsWrap.className = "stat-dots";
    for (var i = 0; i < 5; i++) {
      var dot = document.createElement("span");
      dot.className = "stat-dot";
      if (i < val) {
        dot.style.background = meta.color;
        dot.style.boxShadow = "0 0 6px " + meta.color + "88";
      }
      dotsWrap.appendChild(dot);
    }
    row.appendChild(lbl);
    row.appendChild(dotsWrap);
    statsBlock.appendChild(row);
  });

  document.getElementById("result-series").textContent = t.series;
  document.getElementById("result-emoji").textContent = t.emoji;

  var card = document.getElementById("result-card");
  card.style.borderColor = t.color + "40";

  var traitsEl = document.getElementById("result-traits");
  traitsEl.innerHTML = "";
  t.tags.forEach(function(tr) {
    var chip = document.createElement("span");
    chip.className = "trait-chip";
    chip.textContent = tr;
    chip.style.color = t.color;
    chip.style.background = t.color + "1a";
    chip.style.border = "1px solid " + t.color + "40";
    traitsEl.appendChild(chip);
  });

  var slot = document.getElementById("result-image-slot");
  slot.innerHTML = "";
  var img = new Image();
  img.onload = function() {
    slot.innerHTML = "";
    slot.appendChild(img);
  };
  img.onerror = function() {
    slot.innerHTML = '<div class="img-placeholder" style="background:linear-gradient(135deg,' + t.color + '22,' + t.color + '08)"><span style="font-size:4rem">' + t.emoji + '</span><span style="color:' + t.color + ';font-size:1.1rem;font-weight:700">' + t.name + '</span></div>';
  };
  img.src = t.image;

  localStorage.setItem("aniti_result", key);
  showScreen("screen-result");
}

/* ── 对外接口 ── */
var App = {
  start: function() {
    currentIndex = 0;
    resetScores();
    renderQuestion(0);
    showScreen("screen-question");
  },
  retry: function() {
    localStorage.removeItem("aniti_result");
    App.start();
  },
  share: function() {
    var btn = document.getElementById("share-btn");
    btn.textContent = "生成中…";
    btn.disabled = true;

    var card = document.getElementById("result-card");
    var key = calcResult();
    var t = TYPES[key];

    // 先生成 QR code dataURL，再截图
    QRCode.toDataURL("https://mbtianime.com", {
      width: 120, margin: 1,
      color: { dark: "#ffffff", light: "#00000000" }
    }, function(err, qrDataUrl) {
      html2canvas(card, {
        backgroundColor: "#10101e",
        scale: 2,
        useCORS: true,
        allowTaint: true,
      }).then(function(canvas) {
        // 合成：在截图右下角叠加 QR + 网址
        var ctx = canvas.getContext("2d");
        var qrSize = 100;
        var pad = 16;
        var x = canvas.width - qrSize - pad;
        var y = canvas.height - qrSize - pad;

        // 半透明底板
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath();
        ctx.roundRect(x - 8, y - 8, qrSize + 16, qrSize + 28, 8);
        ctx.fill();

        // QR 图
        var qrImg = new Image();
        qrImg.onload = function() {
          ctx.drawImage(qrImg, x, y, qrSize, qrSize);

          // 网址文字
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.font = "bold " + (14 * 2) + "px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("mbtianime.com", x + qrSize / 2, y + qrSize + 18);

          // 导出 & 分享
          canvas.toBlob(function(blob) {
            btn.textContent = "生成分享图片";
            btn.disabled = false;
            var file = new File([blob], "aniti-" + t.code + ".png", { type: "image/png" });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
              navigator.share({
                files: [file],
                title: "ANITI 次元人格测定",
                text: "我是 " + t.name + "！快来测测你是哪个角色？",
              }).catch(function() {});
            } else {
              // 桌面：直接下载
              var a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = "aniti-" + t.code + ".png";
              a.click();
            }
          }, "image/png");
        };
        qrImg.src = qrDataUrl;
      }).catch(function() {
        btn.textContent = "生成分享图片";
        btn.disabled = false;
        showToast();
      });
    });
  },
};

function showToast() {
  var toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2200);
}

/* ── 页面加载时恢复上次结果 ── */
(function() {
  var saved = localStorage.getItem("aniti_result");
  if (saved && TYPES[saved]) {
    scores = {};
    Object.keys(TYPES).forEach(function(k) { scores[k] = 0; });
    scores[saved] = 99;
    showResult();
  }
})();
